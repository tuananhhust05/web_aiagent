
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);background:transparent}
.app{display:flex;height:780px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.sidebar{width:220px;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;flex-direction:column}
.sidebar-logo{padding:16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sidebar-logo h1{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.sidebar-logo p{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.nav-section{padding:12px 8px 4px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.05em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 6px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-secondary);transition:all .15s}
.nav-item:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;border:0.5px solid var(--color-border-tertiary)}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:14px 20px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:500}
.topbar-actions{display:flex;gap:8px;align-items:center}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-red{background:#FCEBEB;color:#791F1F}
.badge-purple{background:#EEEDFE;color:#3C3489}
.badge-gray{background:#F1EFE8;color:#444441}
.content{flex:1;overflow-y:auto;padding:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px}
.card-title{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.card-value{font-size:22px;font-weight:500}
.card-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.section-title{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--color-text-primary)}
.table{width:100%;border-collapse:collapse;font-size:12px}
.table th{text-align:left;padding:6px 10px;background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary)}
.table td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:var(--color-background-secondary)}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.btn{font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4;font-weight:500}
.btn-primary:hover{background:#B5D4F4}
.btn-danger{background:#FCEBEB;color:#791F1F;border-color:#F7C1C1;font-weight:500}
.progress-bar{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.iso-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:#EEEDFE;color:#3C3489;font-weight:500;white-space:nowrap}
.row-flex{display:flex;align-items:center;gap:8px}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--color-border-tertiary)}
.tl-item{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-17px;top:3px;width:8px;height:8px;border-radius:50%;border:2px solid var(--color-background-primary)}
.tl-text{font-size:12px;color:var(--color-text-secondary)}
.tl-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.tl-time{font-size:10px;color:var(--color-text-tertiary);margin-top:1px}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:16px 0}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input,.input-row select{flex:1;padding:6px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.form-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.form-group{margin-bottom:10px}
.form-group input,.form-group select{width:100%;padding:6px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.alert{padding:10px 14px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:10px;border-left:3px solid}
.alert-warn{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.alert-info{background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.alert-success{background:#EAF3DE;color:#27500A;border-color:#639922}
.alert-danger{background:#FCEBEB;color:#791F1F;border-color:#E24B4A}
.chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.toggle{position:relative;display:inline-block;width:32px;height:18px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;border-radius:9px;background:var(--color-border-secondary);cursor:pointer;transition:.2s}
.toggle input:checked+.toggle-slider{background:#185FA5}
.toggle-slider::before{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}
.toggle input:checked+.toggle-slider::before{transform:translateX(14px)}
</style>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>IAM Portal</h1>
      <p>ISO/IEC 27001 Compliant</p>
    </div>
    <div class="nav-section">Core</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <div class="dot" style="background:#185FA5"></div>Dashboard
    </div>
    <div class="nav-item" onclick="showPage('users')">
      <div class="dot" style="background:#639922"></div>Users &amp; Accounts
    </div>
    <div class="nav-item" onclick="showPage('roles')">
      <div class="dot" style="background:#7F77DD"></div>Roles &amp; Permissions
    </div>
    <div class="nav-item" onclick="showPage('lifecycle')">
      <div class="dot" style="background:#EF9F27"></div>Lifecycle
    </div>
    <div class="nav-section">Security</div>
    <div class="nav-item" onclick="showPage('mfa')">
      <div class="dot" style="background:#D85A30"></div>MFA &amp; Auth Policy
    </div>
    <div class="nav-item" onclick="showPage('access_review')">

    </div>
    <div class="nav-item" onclick="showPage('audit')">

    </div>

    <div class="nav-item" onclick="showPage('iso')">
      <div class="dot" style="background:#533AB7"></div>ISO 27001 Coverage
    </div>
    <div class="nav-item" onclick="showPage('reports')">

  </div>

  <div class="main">

      <div class="topbar-actions">

    </div>
    <div class="content" id="main-content">
    </div>
  </div>
</div>

<script>
const PAGES = {

dashboard: () => `

</div>

<div class="card">
  <div class="section-title">Pending actions requiring attention</div>

    <thead><tr><th>Item</th><th>Type</th><th>ISO control</th><th>Due</th><th>Action</th></tr></thead>

      <tr><td>Dev team — MFA exception expires</td><td><span class="pill badge-purple">MFA</span></td><td><span class="iso-tag">A.8.5</span></td><td>3 days</td><td><button class="btn" style="font-size:11px;padding:3px 8px">Review</button></td></tr>

users: () => `
<div class="alert alert-info">User accounts are created and deprovisioned based on approved HR requests only — satisfying ISO A.5.16 (identity management) and A.5.18 (access rights).</div>
<div class="grid4">

</div>`,

lifecycle: () => `

function showPage(id) {
  document.getElementById('main-content').innerHTML = PAGES[id]();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if(el.getAttribute('onclick') && el.getAttribute('onclick').includes(id)) el.classList.add('active');
  });
  const titles = {dashboard:'Dashboard',users:'Users & Accounts',roles:'Roles & Permissions',lifecycle:'Lifecycle Management',mfa:'MFA & Authentication Policy',access_review:'Access Reviews',audit:'Audit Logs',iso:'ISO 27001 Coverage',reports:'Reports & Evidence'};
  document.getElementById('page-title').textContent = titles[id] || id;
}
