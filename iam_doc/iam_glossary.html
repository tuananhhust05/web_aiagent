
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);font-size:14px}
.g-wrap{padding:4px 0 32px}
.g-search{width:100%;padding:10px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:10px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);margin-bottom:16px;outline:none}
.g-search:focus{border-color:var(--color-border-primary)}
.g-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.g-cat{padding:4px 12px;font-size:12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;color:var(--color-text-secondary);transition:all .15s;font-family:var(--font-sans)}
.g-cat:hover,.g-cat.on{color:var(--color-text-primary);border-color:var(--color-border-primary);background:var(--color-background-primary);font-weight:500}
.g-count{font-size:12px;color:var(--color-text-tertiary);margin-bottom:14px}
.g-section{margin-bottom:28px}
.g-section-title{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.g-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.g-card:hover{border-color:var(--color-border-secondary)}
.g-card.expanded{border-color:var(--color-border-primary)}
.g-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.g-term{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.g-badge{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;font-weight:500;margin-top:1px}
.g-short{font-size:12px;color:var(--color-text-secondary);margin-top:5px;line-height:1.5}
.g-detail{display:none;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--color-border-tertiary)}
.g-card.expanded .g-detail{display:block}
.g-def{font-size:13px;line-height:1.7;color:var(--color-text-primary);margin-bottom:10px}
.g-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.g-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.g-iso{font-size:11px;padding:2px 8px;border-radius:20px;background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC;font-weight:500}
.g-flow{font-size:11px;padding:2px 8px;border-radius:20px;background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
.g-example{margin-top:10px;padding:10px 12px;background:var(--color-background-secondary);border-radius:8px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.g-example strong{color:var(--color-text-primary);font-weight:500}
.g-none{color:var(--color-text-tertiary);font-size:13px;padding:24px 0;text-align:center}
.chevron{font-size:12px;color:var(--color-text-tertiary);margin-top:2px;transition:transform .15s;flex-shrink:0}
.g-card.expanded .chevron{transform:rotate(180deg)}
</style>

<div class="g-wrap">
<input class="g-search" type="search" placeholder="Search terms, definitions, ISO controls…" id="search" oninput="render()">
<div class="g-cats" id="cats"></div>
<div class="g-count" id="count"></div>
<div id="out"></div>
</div>

<script>
const TERMS = [

  // ── AUTHENTICATION ─────────────────────────────────────────────────────
  {
    term: 'Login flow',
    cat: 'Authentication',
    badge: 'Flow',
    badgeColor: '#185FA5',
    short: 'The full sequence from entering credentials to receiving a session token.',
    def: 'The login flow is the complete journey a user takes to prove their identity and gain access to the system. It is not just username + password — it involves a chain of checks: does the account exist? Is it locked? Has the password expired? Is MFA enabled? Only when all gates pass does the server create a session and return a token to the browser. Every step is logged to the audit trail.',
    example: 'A user types their email and password and clicks Sign in. The server checks the database, finds the account active and unlocked, sees the password has not expired, checks that MFA is enabled, and issues a 5-minute MFA challenge. The user enters their TOTP code. The server verifies it and creates a session. The browser receives a token it will attach to every future request.',
    iso: ['A.8.5'],
    flows: ['Login flow', 'MFA verification'],
  },
  {
    term: 'Bearer token',
    cat: 'Authentication',
    badge: 'Concept',
    badgeColor: '#888780',
    short: 'A secret string the browser sends with every request to prove who it is.',
    def: 'A Bearer token is a long random string (48 bytes of randomness in this system) returned after a successful login. The browser stores it and sends it in the Authorization header of every subsequent request: "Authorization: Bearer abc123…". The server never stores the raw token — it stores a SHA-256 hash of it. If the token is stolen, the server can revoke the hash and the stolen token becomes useless. The word "bearer" means whoever holds it gets the rights it represents.',
    example: 'Every API request the frontend sends includes the header: Authorization: Bearer f3a91c…. The server hashes that value and looks it up in the sessions table. If it finds a match that has not expired and was not revoked, the request proceeds.',
    iso: ['A.8.5'],
    flows: ['Login flow', 'Permission check'],
  },
  {
    term: 'Session token',
    cat: 'Authentication',
    badge: 'Concept',
    badgeColor: '#888780',
    short: 'The server-side record that proves a login happened and tracks its age.',
    def: 'A session is a record in the database that says "user X logged in at time T from IP Y, and their session is valid until Z." When a user logs in, the server creates this record. Every subsequent request looks up the session to check it has not expired or been revoked. Sessions have two timeouts: an inactivity timeout (15 minutes with no activity) and an absolute timeout (8 hours maximum, even if the user is active). Privileged users have stricter limits: only 1 concurrent session allowed.',
    example: 'A developer logs in at 9:00am. At 9:14am they make a request — the session is refreshed. At 9:30am they walk away without logging out. At 9:45am they return and try to make a request — the session has expired due to 15 minutes of inactivity and they must log in again.',
    iso: ['A.8.5'],
    flows: ['Login flow', 'Permission check', 'Password change'],
  },
  {
    term: 'POST /auth/login',
    cat: 'Authentication',
    badge: 'API endpoint',
    badgeColor: '#0F6E56',
    short: 'The URL the login form submits credentials to.',
    def: 'This is the API endpoint — the specific address on the server — that receives login credentials. POST means data is sent in the request body (not visible in the URL). /auth/login is the path. The server receives the email and password, runs all validation checks, and returns either an error, an MFA challenge ID, or a session token. This endpoint has a strict rate limit: maximum 10 attempts per 15 minutes to prevent brute-force attacks.',
    example: 'The browser sends: POST https://api.company.com/api/auth/login with body { "email": "sara@company.com", "password": "MySecret14!" }. The server responds with either { "error": "Invalid credentials" } or { "requiresMfa": true, "mfaChallengeId": "abc-123" }.',
    iso: ['A.8.5'],
    flows: ['Login flow'],
  },
  {
    term: 'Account lockout',
    cat: 'Authentication',
    badge: 'Security control',
    badgeColor: '#A32D2D',
    short: 'After 5 failed logins, the account is blocked for 30–60 minutes.',
    def: 'Account lockout is a defence against brute-force attacks — automated scripts that try thousands of password combinations. After 5 consecutive failed login attempts, the system sets a locked_until timestamp on the user record. Any further login attempts during the lockout period are rejected immediately, even with the correct password. Standard users are locked for 30 minutes; privileged users (admins, infrastructure) are locked for 60 minutes because their accounts are higher-value targets. Every lockout event is logged to the audit trail with the IP address.',
    example: 'An attacker tries to guess a developer\'s password. After 5 wrong attempts, the account locks. The audit log records AUTH.ACCOUNT_LOCKED with the attacker\'s IP. The security team can review this and block the IP at the firewall level.',
    iso: ['A.8.5'],
    flows: ['Login flow'],
  },
  {
    term: 'Increment fails',
    cat: 'Authentication',
    badge: 'Mechanism',
    badgeColor: '#888780',
    short: 'Each wrong password attempt adds 1 to the failed_login_count counter.',
    def: 'The database keeps a running count of consecutive failed login attempts for each user (the failed_login_count column). Every time someone enters a wrong password, this number goes up by 1. When it reaches 5, the lockout triggers. When a correct password is entered, the counter resets to 0. This is different from a total lifetime counter — it only counts consecutive failures, so one successful login clears the slate.',
    example: 'User types wrong password: failed_login_count = 1. Wrong again: count = 2. Correct password entered: count resets to 0. Wrong: count = 1 again.',
    iso: ['A.8.5'],
    flows: ['Login flow'],
  },
  {
    term: 'Password expired',
    cat: 'Authentication',
    badge: 'State',
    badgeColor: '#854F0B',
    short: 'Password has not been changed within the allowed time window.',
    def: 'Every password has an expiry date set when it was last changed. For standard users this is 90 days; for privileged accounts it is 30 days. When a user logs in, the system checks whether today\'s date is past the password_expires_at timestamp. If it is, the login does not fail — instead, the server returns a special flag telling the frontend to redirect the user to the "change your password" screen before they can proceed. They cannot access any other part of the system until they set a new password.',
    example: 'A developer last changed their password on 1 January. On 2 April (91 days later) they log in. The system accepts their credentials but returns { "requiresPasswordChange": true }. The frontend redirects them to the password change form. Only after they set a new password do they get a session token.',
    iso: ['A.5.17'],
    flows: ['Login flow', 'Password change'],
  },
  {
    term: 'Force password change screen',
    cat: 'Authentication',
    badge: 'UI state',
    badgeColor: '#993C1D',
    short: 'A mandatory interstitial screen shown when a password must be updated before proceeding.',
    def: 'This is a UI state — a screen the user is locked into — that appears whenever the system requires a password change. It occurs in two situations: when the password has expired (past its 90-day or 30-day limit) and when a new user logs in for the first time with a temporary password. The user cannot navigate away from this screen or access any other part of the application until they successfully set a new password that passes all policy checks.',
    example: 'A new hire receives a temporary password by email. On their first login, the system sees force_password_change = true and shows the change screen. The user must create a new password of at least 14 characters that passes the strength checker before they can see the dashboard.',
    iso: ['A.5.17'],
    flows: ['Login flow'],
  },

  // ── MFA ────────────────────────────────────────────────────────────────
  {
    term: 'MFA (Multi-Factor Authentication)',
    cat: 'MFA',
    badge: 'Security control',
    badgeColor: '#3C3489',
    short: 'Proving identity with a second factor beyond just a password.',
    def: 'MFA requires a user to present at least two independent proofs of identity: something they know (the password) and something they have (a time-based code from an app, or a physical security key). Even if an attacker steals someone\'s password, they still cannot log in without the second factor. In this system MFA is mandatory for all users — there are no exceptions without formal approval. Admin and privileged accounts must use a hardware security key (FIDO2), not just an app-based code.',
    example: 'Sara logs in with her password. The system then asks for her authenticator code. She opens Google Authenticator on her phone, reads the 6-digit code (e.g. 482 193), types it in within 30 seconds, and gets access. Without her phone, she cannot log in even with the correct password.',
    iso: ['A.8.5'],
    flows: ['Login flow', 'MFA verification', 'Onboarding checklist'],
  },
  {
    term: 'TOTP (Time-based One-Time Password)',
    cat: 'MFA',
    badge: 'Protocol',
    badgeColor: '#534AB7',
    short: 'A 6-digit code that changes every 30 seconds, generated by an authenticator app.',
    def: 'TOTP is the algorithm behind apps like Google Authenticator, Authy, and 1Password. During MFA enrollment, the server generates a secret key and shares it with the user\'s app (usually via a QR code scan). From then on, both the server and the app independently calculate the same 6-digit code every 30 seconds using that shared secret and the current time. The user types whatever their app currently shows. The server accepts codes from a ±30-second window to account for clock drift. The code is one-time-use — it cannot be reused even within the same 30-second window.',
    example: 'At 10:23:15 both the server and the user\'s app calculate: HMAC(secret, floor(1713870195 / 30)) = 482193. The user types 482193. At 10:23:30 both calculate a new code: 719284. The old code is now invalid.',
    iso: ['A.8.5'],
    flows: ['MFA verification'],
  },
  {
    term: 'MFA challenge',
    cat: 'MFA',
    badge: 'Mechanism',
    badgeColor: '#534AB7',
    short: 'A short-lived token stored in Redis that links a pending MFA verification to a specific user.',
    def: 'When a user\'s credentials pass the first step but MFA is required, the server does not yet trust them. Instead it creates a challenge: a random ID stored in Redis (a fast in-memory database) with a 5-minute expiry and the user\'s ID attached. The server returns only this challenge ID to the browser, not a session token. The browser then sends the MFA code along with the challenge ID to a second endpoint. If the code is correct, the challenge is consumed (deleted), and only then is a real session created. This two-step design prevents any access until both factors are verified.',
    example: 'Server: "Credentials correct, but I need MFA. Here is challenge ID abc-123 — it expires in 5 minutes." Browser stores abc-123. User looks at their app, sees 482193, types it. Browser sends { challengeId: "abc-123", token: "482193" }. Server verifies the code, deletes abc-123 from Redis, creates session.',
    iso: ['A.8.5'],
    flows: ['MFA verification'],
  },
  {
    term: 'TTL (Time To Live)',
    cat: 'MFA',
    badge: 'Concept',
    badgeColor: '#888780',
    short: 'How long something is allowed to exist before it automatically expires.',
    def: 'TTL is a timer that automatically deletes data after a set duration. In Redis, every stored value can have a TTL — when the timer runs out, Redis removes the value without any code needing to run. The MFA challenge has a 5-minute TTL: if the user does not enter their code within 5 minutes, the challenge disappears and the entire login must start again. This prevents an attacker who intercepts a challenge ID from using it hours or days later.',
    example: 'The server runs: redis.setex("mfa_pending:abc-123", 300, userId). The 300 means 300 seconds = 5 minutes. After 5 minutes, Redis automatically deletes the key. Any attempt to use abc-123 after that fails with "challenge expired."',
    iso: ['A.8.5'],
    flows: ['MFA verification'],
  },
  {
    term: 'Redis',
    cat: 'MFA',
    badge: 'Technology',
    badgeColor: '#888780',
    short: 'An in-memory database used for temporary, fast-expiring data like MFA challenges and session caches.',
    def: 'Redis is a database that stores everything in memory (RAM) rather than on disk, making it extremely fast. It is used in this system for data that needs to be created and deleted quickly: MFA challenge IDs, rate-limit counters, and session caches. Redis supports TTL natively — you can create a value and tell Redis to delete it automatically after N seconds. The tradeoff is that Redis data does not survive a server restart, which is exactly what you want for temporary challenge tokens but not for permanent user records (those live in PostgreSQL).',
    example: 'MFA challenge: redis.setex("mfa_pending:abc-123", 300, "user-uuid-here") — stored in memory, auto-deleted in 5 minutes. Rate limit counter: redis.incr("rate:login:192.168.1.1") — incremented with every login attempt, expires after 15 minutes.',
    iso: ['A.8.5'],
    flows: ['MFA verification'],
  },
  {
    term: 'mfa_verified = true',
    cat: 'MFA',
    badge: 'Session field',
    badgeColor: '#0F6E56',
    short: 'A flag on the session record confirming the user completed MFA, not just passwords.',
    def: 'Every session record in the database has an mfa_verified boolean column. It is set to false when a session is first created and only changed to true after the MFA verification step completes successfully. The permission-check middleware inspects this flag on every single request. If a session exists but mfa_verified is false — for example if MFA was disabled or bypassed — the request is rejected with a 401 error. This ensures that a valid session token alone is never enough: the MFA step must also have been completed.',
    example: 'Without mfa_verified: The authenticate middleware sees the session but checks mfa_verified = false, returns { "error": "MFA verification required", "requiresMfa": true } — the browser redirects to the MFA screen. With mfa_verified: middleware passes, request proceeds to the permission check.',
    iso: ['A.8.5'],
    flows: ['MFA verification', 'Permission check'],
  },
  {
    term: 'FIDO2 / hardware security key',
    cat: 'MFA',
    badge: 'Security control',
    badgeColor: '#3C3489',
    short: 'A physical USB or NFC key that proves identity without a code — required for admin accounts.',
    def: 'FIDO2 is a standard for hardware-based authentication. A security key (like a YubiKey) is a physical device — usually a USB stick — that uses public-key cryptography. During login, the browser asks the key to sign a challenge with its private key (which never leaves the device). The server verifies the signature using the public key registered during enrollment. Unlike TOTP codes, FIDO2 is phishing-proof: the key only works on the exact domain it was registered for, so fake login pages get nothing. In this system, admin and privileged accounts must use a FIDO2 key — a phone app is not sufficient.',
    example: 'The IT lead Sara logs in, enters her password, then the browser displays "Insert your security key and tap it." She inserts her YubiKey and touches the gold disc. The key signs the challenge. The server verifies the signature. Session created.',
    iso: ['A.8.5', 'A.8.2'],
    flows: ['MFA verification'],
  },
  {
    term: 'Backup codes',
    cat: 'MFA',
    badge: 'Recovery mechanism',
    badgeColor: '#534AB7',
    short: 'Ten one-time emergency codes generated during MFA enrollment for use if the device is lost.',
    def: 'When a user enrolls MFA, the server generates 10 random backup codes (each 8 characters). They are shown to the user once and never stored in plaintext — only bcrypt hashes are kept. Each code can be used only once as a substitute for the TOTP code if the user has lost their authenticator device. Using a backup code triggers an audit event and should prompt the user to re-enroll MFA on a new device. If a backup code is used, that hash is deleted from the database immediately.',
    example: 'A developer loses their phone. They use one of their backup codes: a8f3c1b9. This is accepted in place of the TOTP code. The server bcrypt-hashes a8f3c1b9 and compares it to the stored list. It matches one entry. That entry is deleted. The developer is told to re-enroll MFA immediately.',
    iso: ['A.8.5'],
    flows: ['MFA verification'],
  },

  // ── PASSWORD POLICY ────────────────────────────────────────────────────
  {
    term: 'zxcvbn',
    cat: 'Password policy',
    badge: 'Library',
    badgeColor: '#854F0B',
    short: 'A password strength library that scores passwords from 0 (terrible) to 4 (excellent).',
    def: 'zxcvbn (pronounced "zxcvbn" — the bottom row of a keyboard, itself a terrible password) is an open-source library developed by Dropbox. Unlike simple rules that just count characters, zxcvbn understands human password patterns: dictionary words, keyboard walks (qwerty, 12345), dates, names, and common substitutions (pa$$word). It assigns a score from 0 to 4. This system requires a score of at least 3. A password that passes all character rules but scores 0 (e.g. "Password123!") is still rejected. This prevents the situation where users game the rules by making technically-compliant but easily guessable passwords.',
    example: '"Password123!" — 13 chars, upper + lower + number + symbol → passes character rules, BUT zxcvbn gives it a score of 1 (too common). Rejected. "Tr0ub4dor&3!" — similar rules, zxcvbn score 4. Accepted.',
    iso: ['A.5.17'],
    flows: ['Password change'],
  },
  {
    term: 'bcrypt',
    cat: 'Password policy',
    badge: 'Algorithm',
    badgeColor: '#0C447C',
    short: 'A slow, deliberately expensive hashing algorithm used to store passwords safely.',
    def: 'bcrypt is the algorithm used to transform a password into a stored hash. Unlike fast hashing (SHA-256, MD5), bcrypt is intentionally slow — controlled by a "cost" parameter. At cost 12, hashing one password takes about 300ms. This is imperceptible to a human logging in, but it means an attacker who steals the database can only test about 3 guesses per second instead of millions. bcrypt also salts each hash automatically (adds random data before hashing), so two users with the same password get different hashes. The system never stores the password itself — only the bcrypt output.',
    example: 'User sets password "Tr0ub4dor&3!". bcrypt(cost=12) produces "$2b$12$LKdV6t3T…" — a 60-character string that looks like noise. This is stored. At login, bcrypt re-hashes the entered password and compares the results. The original password can never be recovered from the hash.',
    iso: ['A.5.17'],
    flows: ['Password change'],
  },
  {
    term: 'Password history (last 12)',
    cat: 'Password policy',
    badge: 'Mechanism',
    badgeColor: '#854F0B',
    short: 'The system keeps the last 12 password hashes and blocks reuse of any of them.',
    def: 'The users table has a password_history column that stores an array of the last 12 bcrypt hashes. When a user sets a new password, the system bcrypt-compares the new password against every hash in this list. If it matches any of them, the change is rejected with "cannot reuse any of your last 12 passwords." This prevents the common pattern of users cycling between a small set of favourite passwords. The newest hash is always at position 1; when the list exceeds 12 entries, the oldest is dropped.',
    example: 'History: [hash_of_SecurePass1!, hash_of_BlueTiger99$, …10 more]. User tries to set "SecurePass1!" again. System bcrypt-compares against all 12 hashes. It matches position 1. Rejected. User tries "GreenDragon77*" — no match in any of the 12. Accepted, pushed to front of list, oldest entry removed.',
    iso: ['A.5.17'],
    flows: ['Password change'],
  },
  {
    term: 'Password expiry (90d / 30d privileged)',
    cat: 'Password policy',
    badge: 'Policy',
    badgeColor: '#854F0B',
    short: 'Passwords auto-expire after 90 days for standard users, 30 days for admins.',
    def: 'When a password is set, the system records a password_expires_at timestamp. For regular users this is 90 days from now; for privileged users (admins, infrastructure role) it is 30 days. Every login checks this timestamp. When it lapses, the user is redirected to the password change screen. The shorter expiry for privileged accounts reflects the higher risk of those credentials being targeted. Password expiry is written to the audit log, and a daily cron job flags any accounts approaching expiry so the security team can monitor compliance.',
    example: 'Admin Sara sets a new password on 1 January. Her expiry is set to 31 January (30 days). On 1 February she logs in — the system sees password_expires_at < now, sets force_password_change = true, and redirects her to the change screen before she can see the dashboard.',
    iso: ['A.5.17', 'A.8.2'],
    flows: ['Login flow', 'Password change'],
  },
  {
    term: 'Revoke ALL current sessions',
    cat: 'Password policy',
    badge: 'Security action',
    badgeColor: '#993C1D',
    short: 'Every active session for a user is immediately invalidated when their password changes.',
    def: 'When a password is changed, the assumption is that it was changed because the old password may have been compromised. Any sessions created with the old password could therefore be attacker-controlled. The system immediately marks every active session for that user as revoked in the database. Any existing browser tabs holding old session tokens will get a 401 Unauthorized on their next request and be forced to log in again with the new password. This happens automatically — the user does not need to manually log out of all devices.',
    example: 'A developer has 3 active sessions: laptop, phone, and a shared test machine. They change their password. All 3 session tokens are immediately invalidated in the database. The laptop prompts for login. The phone prompts for login. The test machine prompts for login. The attacker who had a copy of the old session token also finds it now returns 401.',
    iso: ['A.5.17', 'A.8.5'],
    flows: ['Password change'],
  },

  // ── RBAC ────────────────────────────────────────────────────────────────
  {
    term: 'RBAC (Role-Based Access Control)',
    cat: 'Roles & permissions',
    badge: 'Architecture',
    badgeColor: '#185FA5',
    short: 'Users are assigned a role, and roles determine what they can do — not individual settings per user.',
    def: 'RBAC is the access control model this system uses. Instead of assigning permissions directly to each user (which becomes unmanageable at scale), users are assigned to a role (admin, developer, hr_manager, etc.) and roles are assigned permissions (users:create, backup:restore, etc.). To give a user access to something, you put them in the right role. To revoke access, you change their role. Every access check compares the user\'s role against the required permission. Roles can be marked as "privileged" which triggers additional controls like shorter session timeouts and mandatory hardware MFA.',
    example: 'The developer role has permissions: code:deploy, backup:read. The hr_manager role has: users:create, users:deprovision. When James (developer) tries to create a new user account, the system checks: does the developer role have the users:create permission? No. 403 Forbidden. When Anna (hr_manager) tries to deploy code, same check: no code:deploy permission for hr_manager. 403.',
    iso: ['A.5.15', 'A.5.18'],
    flows: ['Permission check', 'Role change'],
  },
  {
    term: 'Least privilege',
    cat: 'Roles & permissions',
    badge: 'Principle',
    badgeColor: '#185FA5',
    short: 'Every user gets the minimum permissions needed to do their job — nothing more.',
    def: 'Least privilege is the foundational security principle behind the entire RBAC design. A developer should not have admin access to the HR system. An HR manager should not be able to deploy code. The default role assigned to new accounts before their role is confirmed is read_only — absolute minimum access. When a user is onboarded, they are given only the role appropriate for their actual job, with explicit written justification required. This limits the blast radius if any account is compromised: an attacker who steals a developer\'s credentials still cannot access the backup system or HR records.',
    example: 'A new marketing hire is onboarded. The provisioning request specifies role: read_only, because marketing does not need code, backup, or user management access. If they later need to access the analytics dashboard, a separate access request with justification must be submitted and approved.',
    iso: ['A.5.15', 'A.5.18'],
    flows: ['Permission check', 'Provision user'],

    example: 'An incident occurs. The security team runs: SELECT * FROM audit_logs WHERE subject_user_id = \'suspect-uuid\' ORDER BY event_time DESC. They get a complete timeline of everything that happened to and from that account: every login, every access, every permission denial — all timestamped and chained. The hash chain verification confirms no entries have been modified since they were written.',
    iso: ['A.8.15'],

  // ── ACCESS REVIEW ──────────────────────────────────────────────────────

    badgeColor: '#3B6D11',
    short: 'A scheduled, formal check that every user\'s access is still appropriate for their current role.',
    def: 'An access review is a periodic exercise where a designated reviewer (usually a team lead or manager) looks at every user in their team and decides: does this person still need this level of access? Decisions are Retain (access is appropriate), Downgrade (reduce to a lower permission level), or Revoke (remove access entirely). Quarterly reviews are required for privileged accounts; annual reviews for standard users. The review is tracked in the access_reviews and access_review_items tables. Overdue reviews trigger automated alerts.',

    example: 'Reviewer sees: User A — still in same developer role, review decision Retain. User B — moved to a sales role 2 months ago but still has developer permissions, decision Revoke (executed immediately: sessions revoked, role removed). User C — became a team lead, decision Downgrade from admin to developer (requires separate role change request). Review signed off.',

const CATS = ['All', ...new Set(TERMS.map(t=>t.cat))];

let activeCat = 'All';
let activeCard = null;

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = TERMS.filter(t => {
    const matchCat = activeCat === 'All' || t.cat === activeCat;
    const matchQ = !q || t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q) || t.short.toLowerCase().includes(q) || t.iso.some(i=>i.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('count').textContent = `${filtered.length} term${filtered.length!==1?'s':''} shown`;

  const byCat = {};
  filtered.forEach(t => { if(!byCat[t.cat]) byCat[t.cat]=[]; byCat[t.cat].push(t); });

  const out = document.getElementById('out');
  if(!filtered.length) { out.innerHTML='<div class="g-none">No terms match your search.</div>'; return; }

  const showCats = activeCat === 'All' ? Object.keys(byCat) : [activeCat];
  out.innerHTML = showCats.map(cat => `
    <div class="g-section">
      <div class="g-section-title">${cat}</div>
      <div class="g-grid">${byCat[cat].map(t => card(t)).join('')}</div>
    </div>
  `).join('');

  out.querySelectorAll('.g-card').forEach(el => {
    el.addEventListener('click', () => {
      const isExpanded = el.classList.contains('expanded');
      out.querySelectorAll('.g-card.expanded').forEach(c=>c.classList.remove('expanded'));
      if(!isExpanded) el.classList.add('expanded');
    });
  });
}

function card(t) {
  const isoTags = t.iso.map(i=>`<span class="g-iso">${i}</span>`).join('');
  const flowTags = t.flows.map(f=>`<span class="g-flow">${f}</span>`).join('');
  return `<div class="g-card">
    <div class="g-card-head">
      <div class="g-term">${t.term}</div>
      <span class="g-badge" style="background:${t.badgeColor}18;color:${t.badgeColor};border:0.5px solid ${t.badgeColor}40">${t.badge}</span>
      <span class="chevron">▾</span>
    </div>
    <div class="g-short">${t.short}</div>
    <div class="g-detail">
      <div class="g-def">${t.def}</div>
      <div class="g-example"><strong>Example:</strong> ${t.example}</div>
      <div class="g-meta">${isoTags}${flowTags}</div>
    </div>
  </div>`;
}

const catsEl = document.getElementById('cats');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'g-cat' + (c==='All'?' on':'');
  btn.textContent = c;
  btn.onclick = () => {
    document.querySelectorAll('.g-cat').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeCat = c;
    render();
  };
  catsEl.appendChild(btn);
});

render();
</script>
