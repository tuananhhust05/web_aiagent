function buildSVG(j) {
  const nodeMap = {};
  j.nodes.forEach(n => nodeMap[n.id]=n);

  const maxY = Math.max(...j.nodes.map(n=>n.y+n.h));
  const H = maxY + 60;

  const cx = n => n.x + n.w/2;
  const cy = n => n.y + n.h/2;
  const top = n => ({x:cx(n), y:n.y});
  const bot = n => ({x:cx(n), y:n.y+n.h});
  const left = n => ({x:n.x, y:cy(n)});
  const right = n => ({x:n.x+n.w, y:cy(n)});

  let svg = `<svg width="100%" viewBox="0 0 680 ${H}" role="img"><title>${j.label} flow</title><desc>${j.sub}</desc>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

  // Draw edges first
  j.edges.forEach(e => {
    const fn = nodeMap[e.f], tn = nodeMap[e.t];
    if(!fn||!tn) return;
    const col = '#888780';
    let d = '';
    if(e.side==='left') {
      const s = bot(fn), en = top(tn);
      const mx = Math.min(fn.x, tn.x) - 28;
      d = `M${s.x},${s.y} L${s.x},${s.y+12} L${mx},${s.y+12} L${mx},${en.y-12} L${en.x},${en.y-12} L${en.x},${en.y}`;
    } else if(e.side==='right') {
      const s = bot(fn), en = top(tn);
      const mx = Math.max(fn.x+fn.w, tn.x+tn.w) + 28;
      d = `M${s.x},${s.y} L${s.x},${s.y+12} L${mx},${s.y+12} L${mx},${en.y-12} L${en.x},${en.y-12} L${en.x},${en.y}`;
    } else if(e.bent) {
      const s = right(fn), en = top(tn);
      d = `M${s.x},${s.y} L${s.x+20},${s.y} L${s.x+20},${en.y-10} L${en.x},${en.y-10} L${en.x},${en.y}`;
    } else {
      const s = bot(fn), en = top(tn);
      d = `M${s.x},${s.y} L${en.x},${en.y}`;
    }
    svg += `<path d="${d}" fill="none" stroke="${col}" stroke-width="1" marker-end="url(#arr)"/>`;
    if(e.label) {
      const mid = e.side==='left'
        ? {x: Math.min(fn.x, tn.x)-36, y: fn.y+fn.h+24}
        : e.side==='right'
        ? {x: Math.max(fn.x+fn.w, tn.x+tn.w)+36, y: fn.y+fn.h+24}
        : {x: (cx(fn)+cx(tn))/2+8, y: (fn.y+fn.h+tn.y)/2};
      svg += `<text x="${mid.x}" y="${mid.y}" text-anchor="middle" font-size="10" fill="#888780" font-family="var(--font-sans)">${e.label}</text>`;
    }
  });

  // Draw nodes
  j.nodes.forEach(n => {
    const clr = COLOR_MAP[n.c] || COLOR_MAP.gray;
    const lines = n.label.split('\n');
    const totalH = lines.length === 1 ? n.h : n.h + (lines.length-1)*2;

    if(n.diamond) {
      const cx2=n.x+n.w/2, cy2=n.y+n.h/2, hw=n.w/2, hh=n.h/2+4;
      svg += `<polygon points="${cx2},${n.y-4} ${n.x+n.w+4},${cy2} ${cx2},${n.y+n.h+4} ${n.x-4},${cy2}"
        fill="${clr.fill}" stroke="${clr.stroke}" stroke-width="1"/>`;
      lines.forEach((line,i) => {
        const ly = cy2 + (i-(lines.length-1)/2)*15;
        svg += `<text x="${cx2}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="${lines.length>1?10:11}" fill="${clr.text}" font-family="var(--font-sans)" font-weight="500">${line}</text>`;
      });
    } else {
      svg += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="8"
        fill="${clr.fill}" stroke="${clr.stroke}" stroke-width="1"/>`;
      lines.forEach((line,i) => {
        const baseY = n.y + n.h/2 + (i-(lines.length-1)/2)*15;
        svg += `<text x="${n.x+n.w/2}" y="${baseY}" text-anchor="middle" dominant-baseline="central"
          font-size="${lines.length>1?10:11}" fill="${clr.text}" font-family="var(--font-sans)"
          font-weight="${i===0?'500':'400'}">${line}</text>`;
      });
    }
  });

  svg += '</svg>';
  return svg;
}

const nav = document.getElementById('nav');
const container = document.getElementById('journeys');

JOURNEYS.forEach((j,i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i===0?' active':'');
  btn.textContent = j.label;
  btn.style.borderColor = i===0 ? j.color : '';
  btn.style.color = i===0 ? j.color : '';
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.style.borderColor='';b.style.color='';});
    btn.classList.add('active');
    btn.style.borderColor = j.color;
    btn.style.color = j.color;
    document.querySelectorAll('.journey').forEach(el=>el.classList.remove('visible'));
    document.getElementById('j-'+j.id).classList.add('visible');
  };
  nav.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'journey' + (i===0?' visible':'');
  div.id = 'j-'+j.id;
  div.innerHTML = `<div class="journey-title">${j.label}</div><div class="journey-sub">${j.sub}</div>${buildSVG(j)}`;
  container.appendChild(div);
});
</script>
